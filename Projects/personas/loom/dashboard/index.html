<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PersonaBrain SNN Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--panel:#0e1225;--border:#1a2040;
  --text:#c8cce0;--dim:#5a6080;--accent:#4488ff;
  --exc:#4488ff;--inh:#ff4466;--fire:#ffdd44;
  --energy-hi:#44ff88;--energy-mid:#ffaa22;--energy-lo:#ff4444;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Consolas','Courier New',monospace;font-size:13px;overflow:hidden}
#app{display:grid;grid-template-columns:var(--col-left,260px) 6px 1fr 6px var(--col-right,260px);grid-template-rows:1fr 6px 1fr;height:calc(100vh - 48px - 36px - 40px);padding:6px}
#app>.panel:nth-child(1){grid-column:3;grid-row:1/4}
#app>.panel:nth-child(2){grid-column:5;grid-row:1}
#app>.panel:nth-child(3){grid-column:1;grid-row:1/4}
#app>.panel:nth-child(4){grid-column:5;grid-row:3}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;overflow:hidden;display:flex;flex-direction:column}
/* 리사이즈 거터 */
.gutter-col{grid-row:1/4;cursor:col-resize;background:transparent;display:flex;align-items:center;justify-content:center}
.gutter-col:hover,.gutter-col.active{background:#2a3060}
.gutter-col::after{content:'';width:2px;height:40px;background:var(--dim);border-radius:1px}
.gutter-row{grid-column:5;cursor:row-resize;background:transparent;display:flex;align-items:center;justify-content:center}
.gutter-row:hover,.gutter-row.active{background:#2a3060}
.gutter-row::after{content:'';height:2px;width:40px;background:var(--dim);border-radius:1px}
.panel h2{font-size:13px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
#toolbar{height:42px;display:flex;align-items:center;gap:12px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--border)}
#toolbar .title{font-size:15px;font-weight:bold;color:var(--accent);margin-right:auto}
#toolbar button{background:#1a2040;border:1px solid var(--border);color:var(--text);padding:4px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px}
#toolbar button:hover{background:#2a3060}
#toolbar button.active{background:var(--accent);color:#000}
#toolbar label{color:var(--dim);font-size:12px}
#toolbar input[type=range]{width:100px;accent-color:var(--accent)}
#toolbar .info{color:var(--dim);font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.connected{background:#44ff88}
.status-dot.disconnected{background:#ff4444}

/* 페르소나 탭 바 */
#persona-tabs{height:36px;display:flex;align-items:center;gap:6px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--border)}
.persona-tab{display:flex;align-items:center;gap:5px;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;background:#1a2040;border:1px solid var(--border);color:var(--text);transition:background .15s}
.persona-tab:hover{background:#2a3060}
.persona-tab.selected{background:var(--accent);color:#000;font-weight:bold}
.persona-tab .region-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.region-dot.claude{background:#4488ff}
.region-dot.codex{background:#44cc66}
.region-dot.gemini{background:#ffaa22}

/* 페르소나 상태 요약 바 (항상 표시) */
#persona-summary-bar{height:40px;display:flex;align-items:center;gap:16px;padding:0 12px;background:#0c0e20;border-bottom:1px solid var(--border);overflow-x:auto}
.summary-card{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:4px;background:var(--panel);border:1px solid var(--border);flex-shrink:0}
.summary-card .s-name{font-size:11px;font-weight:bold;color:var(--text);min-width:60px}
.summary-card .s-energy-wrap{width:50px;height:8px;background:#111;border-radius:4px;overflow:hidden}
.summary-card .s-energy-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.summary-card .s-action{font-size:10px;padding:1px 6px;border-radius:8px;background:#1a2040;color:var(--dim)}
.summary-card .s-action.sleeping{background:#2a1040;color:#aa88ff}

/* 좌상: 뉴런 네트워크 */
#neuron-canvas{width:100%;flex:1;border-radius:4px}

/* 우상: 통계 */
#stats-panel{gap:6px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.stat-label{color:var(--dim)}
.stat-value{font-weight:bold}
.mini-canvas{width:100%;height:80px;border-radius:4px}
.gauge-row{display:flex;gap:8px;align-items:center;margin:4px 0}
.gauge-bar{flex:1;height:10px;background:#111;border-radius:5px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:5px;transition:width .3s}

/* 좌하: 페르소나 */
#persona-panel{gap:4px;overflow-y:auto}
.energy-bar-wrap{width:100%;height:18px;background:#111;border-radius:9px;overflow:hidden;margin:4px 0}
.energy-bar-fill{height:100%;border-radius:9px;transition:width .3s,background .3s}
.bar-group{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.bar-item{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:32px}
.bar-item .bar-wrap{width:20px;height:50px;background:#111;border-radius:3px;overflow:hidden;position:relative}
.bar-item .bar-fill{position:absolute;bottom:0;width:100%;border-radius:3px;transition:height .3s}
.bar-item .bar-label{font-size:10px;color:var(--dim)}
.bar-item .bar-val{font-size:10px}
#radar-canvas{width:200px;height:200px}
.action-badge{display:inline-block;padding:2px 10px;border-radius:10px;background:#1a2040;font-size:12px;margin:4px 0}
.sleeping-badge{background:#2a1040;color:#aa88ff}

/* 관계 패널 */
#relationship-section{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.rel-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px}
.rel-names{min-width:100px;color:var(--text);font-size:10px}
.rel-bar-wrap{flex:1;height:6px;background:#111;border-radius:3px;overflow:hidden}
.rel-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.rel-trust{font-size:10px;color:var(--dim);min-width:35px;text-align:right}
.rel-count{font-size:10px;color:var(--dim);min-width:20px;text-align:right}

/* 인터랙션 로그 스타일 */
.log-interaction{color:#44ccaa !important;font-weight:bold}
.log-secret{display:inline-block;background:#cc2244;color:#fff;font-size:9px;padding:0 4px;border-radius:3px;margin-left:4px;font-weight:bold}
.log-rumor{display:inline-block;background:#aa6600;color:#fff;font-size:9px;padding:0 4px;border-radius:3px;margin-left:4px;font-weight:bold}

/* 툴팁 */
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#1a2040;color:var(--accent);font-size:9px;font-weight:bold;cursor:pointer;margin-left:4px;border:1px solid var(--border);vertical-align:middle;line-height:1;user-select:none;flex-shrink:0}
.info-btn:hover{background:var(--accent);color:#000}
.tooltip-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999}
.tooltip-box{position:fixed;z-index:1000;background:#1a2040;border:1px solid var(--accent);border-radius:6px;padding:10px 14px;max-width:320px;font-size:12px;line-height:1.6;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.tooltip-box .tt-title{color:var(--accent);font-weight:bold;margin-bottom:4px;font-size:13px}
.tooltip-box .tt-body{color:#aab}

/* 우하: 시간+로그 */
#log-panel{gap:4px}
.time-display{font-size:18px;font-weight:bold;text-align:center;padding:6px 0;color:var(--fire)}
#action-log{flex:1;overflow-y:auto;font-size:11px;line-height:1.6}
#action-log div{padding:1px 4px;border-bottom:1px solid #111}
#energy-history-canvas{width:100%;height:70px}
</style>
</head>
<body>
<div id="toolbar">
  <span class="title"><span class="status-dot disconnected" id="ws-dot"></span>PersonaBrain SNN</span>
  <button id="btn-play" class="active">Play</button>
  <button id="btn-pause">Pause</button>
  <button id="btn-step">Step</button>
  <label>속도 <input type="range" id="speed-slider" min="100" max="2000" value="500" step="100"><span id="speed-label">0.5s</span></label>
  <span class="info" id="tick-info">Tick 0</span>
</div>
<div id="persona-tabs"></div>
<div id="persona-summary-bar"></div>
<div id="app">
  <!-- 1: 뉴런 네트워크 (가운데, 2행) -->
  <div class="panel">
    <h2>뉴런 네트워크 <span class="info-btn" data-tip="neuron-network">i</span></h2>
    <canvas id="neuron-canvas"></canvas>
  </div>
  <!-- 우상: 뉴런 통계 -->
  <div class="panel" id="stats-panel">
    <h2>뉴런 통계 <span class="info-btn" data-tip="neuron-stats">i</span></h2>
    <div class="stat-row"><span class="stat-label">활성 뉴런 <span class="info-btn" data-tip="active-neurons">i</span></span><span class="stat-value" id="stat-active">0 / 0</span></div>
    <div class="stat-row"><span class="stat-label">발화율 <span class="info-btn" data-tip="firing-rate">i</span></span><span class="stat-value" id="stat-fr">0.00</span></div>
    <div class="stat-row"><span class="stat-label">흥분 발화 <span class="info-btn" data-tip="exc-fire">i</span></span><span class="stat-value" style="color:var(--exc)" id="stat-exc">0</span></div>
    <div class="stat-row"><span class="stat-label">억제 발화 <span class="info-btn" data-tip="inh-fire">i</span></span><span class="stat-value" style="color:var(--inh)" id="stat-inh">0</span></div>
    <div class="gauge-row"><span class="stat-label" style="width:80px">E/I Balance <span class="info-btn" data-tip="ei-balance">i</span></span><div class="gauge-bar"><div class="gauge-fill" id="ei-gauge" style="width:50%;background:linear-gradient(90deg,var(--exc),var(--inh))"></div></div><span id="ei-label" style="width:40px;text-align:right;font-size:11px">0.50</span></div>
    <canvas class="mini-canvas" id="firing-chart"></canvas>
    <h2 style="margin-top:6px">막전위 분포 <span class="info-btn" data-tip="voltage-dist">i</span></h2>
    <canvas class="mini-canvas" id="voltage-hist"></canvas>
  </div>
  <!-- 좌하: 페르소나 -->
  <div class="panel" id="persona-panel">
    <h2>페르소나 상태 <span class="info-btn" data-tip="persona-state">i</span></h2>
    <div class="stat-row"><span class="stat-label">이름</span><span class="stat-value" id="p-name">-</span></div>
    <div class="stat-row"><span class="stat-label">에너지 <span class="info-btn" data-tip="energy">i</span></span><span class="stat-value" id="p-energy-val">0.00</span></div>
    <div class="energy-bar-wrap"><div class="energy-bar-fill" id="p-energy-bar" style="width:0%"></div></div>
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
      <div>
        <h2>톤 (12 클러스터) <span class="info-btn" data-tip="tone-12">i</span></h2>
        <canvas id="radar-canvas" width="200" height="200"></canvas>
      </div>
      <div style="flex:1;min-width:180px">
        <h2>오욕 <span class="info-btn" data-tip="oyok">i</span></h2>
        <div class="bar-group" id="oyok-bars"></div>
        <h2 style="margin-top:6px">칠정 <span class="info-btn" data-tip="chiljeong">i</span></h2>
        <div class="bar-group" id="chiljeong-bars"></div>
      </div>
    </div>
    <div class="stat-row"><span class="stat-label">행동 <span class="info-btn" data-tip="action">i</span></span><span id="p-action" class="action-badge">-</span></div>
    <!-- 관계 섹션 -->
    <div id="relationship-section">
      <h2>관계 <span class="info-btn" data-tip="relationships">i</span></h2>
      <div id="rel-rows"></div>
    </div>
  </div>
  <!-- 우하: 시간+로그 -->
  <div class="panel" id="log-panel">
    <h2>시간 / 행동 로그 <span class="info-btn" data-tip="time-log">i</span></h2>
    <div class="time-display" id="time-display">Day 1, 0시</div>
    <canvas id="energy-history-canvas"></canvas>
    <h2 style="margin-top:4px">최근 행동 로그</h2>
    <div id="action-log"></div>
  </div>
  <!-- 리사이즈 거터 -->
  <div class="gutter-col" id="gutter-left" style="grid-column:2;grid-row:1/4"></div>
  <div class="gutter-col" id="gutter-right" style="grid-column:4;grid-row:1/4"></div>
  <div class="gutter-row" id="gutter-row-right" style="grid-column:5;grid-row:2"></div>
</div>

<script>
// ============================================================
// 상수 / 상태
// ============================================================
const TONE_KEYS = ['V','L','S','B','A','T','C','G','F','I','D','P'];
const OYOK_LABELS = ['식','색','재','명','수'];
const CHILJEONG_LABELS = ['희','노','애','구','애','오','경'];
const MAX_HISTORY = 50;
const MAX_LOG = 40;

const REGION_COLORS = { claude: '#4488ff', codex: '#44cc66', gemini: '#ffaa22' };

let ws = null;
let paused = false;
let firingHistory = {};   // per-persona: { pid: [{exc, inh, total}] }
let energyHistory = {};   // per-persona: { pid: [values] }
let actionLog = [];       // shared log across all personas
let lastState = null;
let selectedPersonaId = null;
let personaIds = [];

// ============================================================
// DOM
// ============================================================
const $=id=>document.getElementById(id);
const neuronCanvas = $('neuron-canvas');
const nCtx = neuronCanvas.getContext('2d');
const firingCanvas = $('firing-chart');
const fCtx = firingCanvas.getContext('2d');
const voltageCanvas = $('voltage-hist');
const vCtx = voltageCanvas.getContext('2d');
const radarCanvas = $('radar-canvas');
const rCtx = radarCanvas.getContext('2d');
const energyCanvas = $('energy-history-canvas');
const eCtx = energyCanvas.getContext('2d');

// ============================================================
// 바 차트 초기화
// ============================================================
function initBars(containerId, labels, color) {
  const c = $(containerId);
  c.innerHTML = '';
  labels.forEach((l,i) => {
    const item = document.createElement('div');
    item.className = 'bar-item';
    item.innerHTML = `<div class="bar-val" id="${containerId}-v${i}">0</div><div class="bar-wrap"><div class="bar-fill" id="${containerId}-f${i}" style="height:0%;background:${color}"></div></div><div class="bar-label">${l}</div>`;
    c.appendChild(item);
  });
}
initBars('oyok-bars', OYOK_LABELS, '#ffaa22');
initBars('chiljeong-bars', CHILJEONG_LABELS, '#aa44ff');

// ============================================================
// 캔버스 리사이즈
// ============================================================
function resizeCanvas(canvas) {
  const r = canvas.parentElement ? canvas.getBoundingClientRect() : {width:300,height:200};
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || r.width;
  const h = canvas.clientHeight || r.height;
  if (canvas.width !== w*dpr || canvas.height !== h*dpr) {
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
  }
  return {w, h};
}

function resizeAll() {
  resizeCanvas(neuronCanvas);
  resizeCanvas(firingCanvas);
  resizeCanvas(voltageCanvas);
  resizeCanvas(energyCanvas);
}
window.addEventListener('resize', resizeAll);
setTimeout(resizeAll, 50);

// ============================================================
// 페르소나 탭 렌더링
// ============================================================
function renderTabs(personas) {
  const container = $('persona-tabs');
  const ids = Object.keys(personas);

  // 페르소나 ID 목록이 변경된 경우에만 DOM 재구성
  if (ids.join(',') !== personaIds.join(',')) {
    personaIds = ids;
    if (!selectedPersonaId || !personas[selectedPersonaId]) {
      selectedPersonaId = ids[0];
    }
    container.innerHTML = '';
    ids.forEach(pid => {
      const p = personas[pid];
      const tab = document.createElement('button');
      tab.className = 'persona-tab' + (pid === selectedPersonaId ? ' selected' : '');
      tab.dataset.pid = pid;
      const region = (p.meta && p.meta.region) || 'claude';
      tab.innerHTML = `<span class="region-dot ${region}"></span>${p.name}`;
      tab.onclick = () => selectPersona(pid);
      container.appendChild(tab);
    });
  } else {
    // 선택 상태만 갱신
    container.querySelectorAll('.persona-tab').forEach(tab => {
      tab.classList.toggle('selected', tab.dataset.pid === selectedPersonaId);
    });
  }
}

function selectPersona(pid) {
  selectedPersonaId = pid;
  // 선택 시 기존 데이터로 즉시 재렌더
  if (lastState) {
    renderTabs(lastState.personas);
    renderSelectedPersona(lastState);
    renderSummaryBar(lastState.personas);
  }
}

// ============================================================
// 페르소나 요약 바
// ============================================================
function renderSummaryBar(personas) {
  const bar = $('persona-summary-bar');
  const ids = Object.keys(personas);
  bar.innerHTML = '';
  ids.forEach(pid => {
    const p = personas[pid];
    const en = p.energy || 0;
    const pct = (en * 100).toFixed(0);
    const color = en > 0.5 ? 'var(--energy-hi)' : en > 0.2 ? 'var(--energy-mid)' : 'var(--energy-lo)';
    const isSleeping = p.sleeping;
    const actionText = isSleeping ? 'sleep' : (p.action || '-');
    const actionClass = isSleeping ? 's-action sleeping' : 's-action';
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.innerHTML = `<span class="s-name">${p.name || pid}</span><div class="s-energy-wrap"><div class="s-energy-fill" style="width:${pct}%;background:${color}"></div></div><span class="${actionClass}">${actionText}</span>`;
    card.style.cursor = 'pointer';
    card.onclick = () => selectPersona(pid);
    bar.appendChild(card);
  });
}

// ============================================================
// WebSocket
// ============================================================
function connect() {
  ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => { $('ws-dot').className = 'status-dot connected'; };
  ws.onclose = () => { $('ws-dot').className = 'status-dot disconnected'; setTimeout(connect, 2000); };
  ws.onerror = () => {};
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    lastState = d;
    update(d);
  };
}
connect();

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

// 컨트롤
$('btn-play').onclick = () => { paused=false; send({type:'resume'}); $('btn-play').classList.add('active'); $('btn-pause').classList.remove('active'); };
$('btn-pause').onclick = () => { paused=true; send({type:'pause'}); $('btn-pause').classList.add('active'); $('btn-play').classList.remove('active'); };
$('btn-step').onclick = () => { send({type:'step'}); };
$('speed-slider').oninput = function() { const v=this.value/1000; $('speed-label').textContent=v.toFixed(1)+'s'; send({type:'set_speed',interval:v}); };

// ============================================================
// 데이터 호환 레이어: 멀티/싱글 페르소나 모두 처리
// ============================================================
function isMultiPersona(d) {
  return d.personas && typeof d.personas === 'object';
}

function extractPersonaData(d, pid) {
  // 멀티 페르소나 구조에서 단일 페르소나 데이터 추출
  const p = d.personas[pid];
  if (!p) return null;

  // 서버가 보내는 구조: neurons, tone, oyok, emotions 등이 페르소나 객체 내부에 있음
  return p;
}

// ============================================================
// 메인 업데이트
// ============================================================
function update(d) {
  $('tick-info').textContent = 'Tick ' + d.tick;
  $('time-display').textContent = `Day ${d.day}, ${d.hour}시`;

  if (isMultiPersona(d)) {
    // 멀티 페르소나 모드
    renderTabs(d.personas);
    renderSummaryBar(d.personas);

    // 모든 페르소나의 히스토리 갱신
    for (const pid of Object.keys(d.personas)) {
      const p = d.personas[pid];
      updatePerPersonaHistory(pid, p);
    }

    // 인터랙션 로그 추가
    if (d.interactions && d.interactions.length > 0) {
      for (const ix of d.interactions) {
        actionLog.unshift({
          tick: d.tick, hour: d.hour, day: d.day,
          type: 'interaction', interaction: ix
        });
      }
    }

    // 시크릿/루머 로그
    if (d.secrets) {
      for (const [key, secret] of Object.entries(d.secrets)) {
        if (secret._new) {
          actionLog.unshift({
            tick: d.tick, hour: d.hour, day: d.day,
            type: 'secret', secret: secret
          });
        }
      }
    }

    // 각 페르소나 행동 로그
    for (const pid of Object.keys(d.personas)) {
      const p = d.personas[pid];
      actionLog.unshift({
        tick: d.tick, hour: d.hour, day: d.day,
        type: 'action',
        persona: p.name || pid,
        action: p.action || '-',
        sleeping: p.sleeping
      });
    }
    if (actionLog.length > MAX_LOG) actionLog.length = MAX_LOG;

    // 선택된 페르소나의 상세 패널 업데이트
    renderSelectedPersona(d);
    renderRelationships(d.relationships, d.personas);
    renderLog();
  } else {
    // 레거시 단일 페르소나 모드 (하위 호환)
    updateLegacySingle(d);
  }
}

function updatePerPersonaHistory(pid, p) {
  if (!firingHistory[pid]) firingHistory[pid] = [];
  if (!energyHistory[pid]) energyHistory[pid] = [];

  const en = p.energy || 0;
  energyHistory[pid].push(en);
  if (energyHistory[pid].length > MAX_HISTORY) energyHistory[pid].shift();

  const neurons = p.neurons;
  if (neurons) {
    const excSpikes = neurons.exc_spikes || 0;
    const inhSpikes = neurons.inh_spikes || 0;
    const nExc = neurons.n_exc || 1;
    const nInh = neurons.n_inh || 1;
    firingHistory[pid].push({
      total: neurons.firing_rate || 0,
      exc: nExc > 0 ? excSpikes / nExc : 0,
      inh: nInh > 0 ? inhSpikes / nInh : 0
    });
    if (firingHistory[pid].length > MAX_HISTORY) firingHistory[pid].shift();
  }
}

function renderSelectedPersona(d) {
  if (!selectedPersonaId || !d.personas[selectedPersonaId]) return;
  const p = d.personas[selectedPersonaId];

  // 이름
  const region = (p.meta && p.meta.region) || '';
  $('p-name').textContent = p.name + (region ? ` [${region}]` : '');

  // 에너지
  const en = p.energy || 0;
  $('p-energy-val').textContent = en.toFixed(4);
  const pct = (en * 100).toFixed(1);
  const ebar = $('p-energy-bar');
  ebar.style.width = pct + '%';
  ebar.style.background = en > 0.5 ? 'var(--energy-hi)' : en > 0.2 ? 'var(--energy-mid)' : 'var(--energy-lo)';

  // 오욕
  if (p.oyok) {
    const oyokKeys = ['hunger','lust','greed','fame','sleep'];
    const oyokVals = Array.isArray(p.oyok) ? p.oyok : oyokKeys.map(k => p.oyok[k] || 0);
    oyokVals.forEach((v,i) => {
      const el = $('oyok-bars-f'+i);

      const vl = $('oyok-bars-v'+i);
      if(vl) vl.textContent = (typeof v === 'number') ? v.toFixed(2) : '0';
    });
  }

  // 칠정 (emotions)
  if (p.emotions) {
    const emotionKeys = ['joy','anger','sadness','fear','love','disgust','desire'];
    const emotionVals = Array.isArray(p.emotions) ? p.emotions : emotionKeys.map(k => p.emotions[k] || 0);
    emotionVals.forEach((v,i) => {
      const el = $('chiljeong-bars-f'+i);
      if(el){el.style.height=(Math.abs(v)*100)+'%';}
      const vl = $('chiljeong-bars-v'+i);
      if(vl) vl.textContent = (typeof v === 'number') ? v.toFixed(2) : '0';
    });
  }

  // 행동
  const ab = $('p-action');
  if (p.sleeping) {
    ab.textContent = 'sleeping';
    ab.className = 'action-badge sleeping-badge';
  } else {
    ab.textContent = p.action || '-';
    ab.className = 'action-badge';
  }

  // 뉴런 통계
  const neurons = p.neurons;
  if (neurons) {
    const spikes = neurons.spikes || [];
    const activeCount = spikes.reduce((a,b)=>a+b,0);
    $('stat-active').textContent = `${activeCount} / ${neurons.n_neurons || spikes.length}`;
    $('stat-fr').textContent = (neurons.firing_rate || 0).toFixed(4);
    $('stat-exc').textContent = neurons.exc_spikes || 0;
    $('stat-inh').textContent = neurons.inh_spikes || 0;

    const total = (neurons.exc_spikes || 0) + (neurons.inh_spikes || 0);
    const eiRatio = total > 0 ? (neurons.exc_spikes || 0) / total : 0.5;
    $('ei-gauge').style.width = (eiRatio*100)+'%';
    $('ei-label').textContent = eiRatio.toFixed(2);

    drawNeurons(neurons);

    drawVoltageHist(neurons.voltages, neurons.threshold);
  } else {
    $('stat-active').textContent = '- (수면)';
    $('stat-fr').textContent = '-';
  }

  // 에너지 히스토리
  drawEnergyChart(selectedPersonaId);

  // 톤 레이더
  if (p.tone) {
    drawRadar(p.tone);
  }
}

// ============================================================
// 뉴런 네트워크 시각화 (Canvas)
// ============================================================
function drawNeurons(neurons) {
  const {w,h} = resizeCanvas(neuronCanvas);
  const ctx = nCtx;
  ctx.clearRect(0,0,w,h);

  const n = neurons.voltages.length;
  const nExc = neurons.n_exc;
  const cx = w/2, cy = h/2;
  const radius = Math.min(w,h)*0.40;

  // 뉴런 위치 계산
  const pos = [];
  for (let i=0;i<n;i++){
    const angle = (2*Math.PI*i/n) - Math.PI/2;
    pos.push({x:cx+radius*Math.cos(angle), y:cy+radius*Math.sin(angle)});
  }

  // 연결선
  const conns = neurons.connections;
  if (conns && conns.length > 0) {
    for (const c of conns) {
      if (c.from >= n || c.to >= n) continue;
      const from = pos[c.from];
      const to = pos[c.to];
      const isExc = c.weight > 0;
      const alpha = Math.min(1, Math.abs(c.weight) * 4);
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = isExc ? `rgba(68,136,255,${alpha*0.3})` : `rgba(255,68,102,${alpha*0.3})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // 화살표
      if (alpha > 0.15) {
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const len = Math.sqrt(dx*dx+dy*dy);
        if (len > 10) {
          const mx = from.x + dx*0.65;
          const my = from.y + dy*0.65;
          const ang = Math.atan2(dy,dx);
          const aSize = 3;
          ctx.beginPath();
          ctx.moveTo(mx, my);
          ctx.lineTo(mx - aSize*Math.cos(ang-0.5), my - aSize*Math.sin(ang-0.5));
          ctx.lineTo(mx - aSize*Math.cos(ang+0.5), my - aSize*Math.sin(ang+0.5));
          ctx.closePath();
          ctx.fillStyle = isExc ? `rgba(68,136,255,${alpha*0.5})` : `rgba(255,68,102,${alpha*0.5})`;
          ctx.fill();
        }
      }
    }
  }

  // 뉴런 원
  for (let i=0;i<n;i++){
    const p = pos[i];
    const isExc = i < nExc;
    const spiking = neurons.spikes[i] === 1;
    const refr = neurons.refractory ? neurons.refractory[i] > 0 : false;
    let r = 3;
    let color;

    if (spiking) {
      color = '#ffdd44';
      r = 5;
      // glow
      ctx.beginPath();
      const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,12);
      grad.addColorStop(0, 'rgba(255,221,68,0.6)');
      grad.addColorStop(1, 'rgba(255,221,68,0)');
      ctx.fillStyle = grad;
      ctx.arc(p.x,p.y,12,0,Math.PI*2);
      ctx.fill();
    } else if (refr) {
      color = '#222233';
      r = 2.5;
    } else {
      color = isExc ? '#4488ff' : '#ff4466';
      const v = Math.max(0, Math.min(1, neurons.voltages[i] / neurons.threshold));
      const bright = 0.3 + v * 0.7;
      if (isExc) {
        color = `rgba(68,136,255,${bright})`;
      } else {
        color = `rgba(255,68,102,${bright})`;
      }
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // 범례
  ctx.font = '11px Consolas, monospace';
  ctx.fillStyle = '#4488ff'; ctx.fillRect(10,h-40,8,8); ctx.fillStyle='#889';ctx.fillText('흥분',22,h-32);
  ctx.fillStyle = '#ff4466'; ctx.fillRect(10,h-26,8,8); ctx.fillStyle='#889';ctx.fillText('억제',22,h-18);
  ctx.fillStyle = '#ffdd44'; ctx.fillRect(70,h-40,8,8); ctx.fillStyle='#889';ctx.fillText('발화',82,h-32);
  ctx.fillStyle = '#222233'; ctx.fillRect(70,h-26,8,8); ctx.fillStyle='#889';ctx.fillText('불응',82,h-18);
}

// ============================================================
// 발화율 그래프
// ============================================================
function drawFiringChart(pid) {
  const {w,h} = resizeCanvas(firingCanvas);
  const ctx = fCtx;
  ctx.clearRect(0,0,w,h);
  const hist = firingHistory[pid] || [];
  if (hist.length < 2) return;

  const n = hist.length;
  const xStep = w / (MAX_HISTORY - 1);

  ctx.strokeStyle = '#1a2040';
  ctx.lineWidth = 0.5;
  for (let y=0;y<=4;y++){
    const yy = h * y/4;
    ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(w,yy);ctx.stroke();
  }

  function drawLine(data, key, color) {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    let maxVal = 1;
    for (let i=0;i<n;i++) maxVal = Math.max(maxVal, data[i][key]);
    for (let i=0;i<n;i++){
      const x = (MAX_HISTORY - n + i) * xStep;
      const y = h - (data[i][key] / maxVal) * (h - 4);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  drawLine(hist, 'total', '#ffffff');
  drawLine(hist, 'exc', '#4488ff');
  drawLine(hist, 'inh', '#ff4466');

  ctx.font = '10px Consolas';
  ctx.fillStyle='#fff';ctx.fillText('전체',w-120,12);
  ctx.fillStyle='#4488ff';ctx.fillText('흥분',w-80,12);
  ctx.fillStyle='#ff4466';ctx.fillText('억제',w-40,12);
}

// ============================================================
// 막전위 히스토그램
// ============================================================
function drawVoltageHist(voltages, threshold) {
  const {w,h} = resizeCanvas(voltageCanvas);
  const ctx = vCtx;
  ctx.clearRect(0,0,w,h);

  const bins = 20;
  const minV = -0.2, maxV = threshold * 1.2;
  const range = maxV - minV;
  const counts = new Array(bins).fill(0);
  for (const v of voltages) {
    const idx = Math.floor(((v - minV) / range) * bins);
    if (idx >= 0 && idx < bins) counts[idx]++;
  }
  const maxCount = Math.max(1, ...counts);
  const barW = w / bins;

  for (let i=0;i<bins;i++){
    const barH = (counts[i]/maxCount) * (h-16);
    const x = i * barW;
    const val = minV + (i+0.5)*(range/bins);
    const ratio = val / threshold;
    const r = Math.min(255, Math.floor(ratio * 255));
    const g = Math.max(0, 255 - r);
    ctx.fillStyle = `rgb(${r},${g},100)`;
    ctx.fillRect(x+1, h-barH-12, barW-2, barH);
  }

  const thX = ((threshold - minV)/range)*w;
  ctx.strokeStyle = '#ffdd44';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(thX,0);ctx.lineTo(thX,h);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='10px Consolas';
  ctx.fillStyle='#ffdd44';
  ctx.fillText('threshold',thX+4,10);
}

// ============================================================
// 톤 레이더 차트
// ============================================================
function drawRadar(tone) {
  const canvas = radarCanvas;
  const ctx = rCtx;
  const w=200,h=200;
  canvas.width=200;canvas.height=200;
  ctx.clearRect(0,0,w,h);

  const cx=w/2, cy=h/2, r=70;
  const n = TONE_KEYS.length;
  const angleStep = (2*Math.PI)/n;

  for (let ring=1;ring<=4;ring++){
    const rr = r*ring/4;
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      const a = angleStep*i - Math.PI/2;
      const x=cx+rr*Math.cos(a), y=cy+rr*Math.sin(a);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle='#1a2040';ctx.lineWidth=0.5;ctx.stroke();
  }

  for(let i=0;i<n;i++){
    const a = angleStep*i - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='#1a2040';ctx.lineWidth=0.5;ctx.stroke();
    const lx=cx+(r+14)*Math.cos(a);
    const ly=cy+(r+14)*Math.sin(a);
    ctx.font='10px Consolas';ctx.fillStyle='#889';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(TONE_KEYS[i],lx,ly);
  }

  ctx.beginPath();
  for(let i=0;i<=n;i++){
    const idx = i%n;
    const a = angleStep*idx - Math.PI/2;
    const val = Math.max(0, Math.min(1, tone[TONE_KEYS[idx]] || 0));
    const x=cx+r*val*Math.cos(a);
    const y=cy+r*val*Math.sin(a);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.fillStyle='rgba(68,136,255,0.2)';ctx.fill();
  ctx.strokeStyle='#4488ff';ctx.lineWidth=1.5;ctx.stroke();

  for(let i=0;i<n;i++){
    const a = angleStep*i - Math.PI/2;
    const val = Math.max(0, Math.min(1, tone[TONE_KEYS[i]] || 0));
    const x=cx+r*val*Math.cos(a);
    const y=cy+r*val*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle='#4488ff';ctx.fill();
  }
}

// ============================================================
// 에너지 히스토리
// ============================================================
function drawEnergyChart(pid) {
  const {w,h} = resizeCanvas(energyCanvas);
  const ctx = eCtx;
  ctx.clearRect(0,0,w,h);
  const hist = energyHistory[pid] || [];
  if (hist.length < 2) return;

  const n = hist.length;
  const xStep = w / (MAX_HISTORY - 1);

  ctx.beginPath();
  for(let i=0;i<n;i++){
    const x = (MAX_HISTORY-n+i)*xStep;
    const y = h - hist[i] * (h-4);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineTo((MAX_HISTORY-1)*xStep, h);
  ctx.lineTo((MAX_HISTORY-n)*xStep, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(68,255,136,0.1)';
  ctx.fill();

  ctx.beginPath();
  for(let i=0;i<n;i++){
    const x = (MAX_HISTORY-n+i)*xStep;
    const y = h - hist[i] * (h-4);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.strokeStyle = '#44ff88';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// 행동 로그
// ============================================================
function renderLog() {
  const el = $('action-log');
  el.innerHTML = actionLog.map(l => {
    const prefix = `<span style="color:var(--dim)">D${l.day} ${l.hour}시 T${l.tick}</span>`;

    if (l.type === 'interaction' && l.interaction) {
      const ix = l.interaction;
      const names = [ix.from_name || ix.from, ix.to_name || ix.to].join('\u2194');
      const fam = ix.familiarity != null ? ` f=${ix.familiarity.toFixed(2)}` : '';
      let extra = '';
      if (ix.secret) extra += '<span class="log-secret">SECRET!</span>';
      if (ix.rumor) extra += `<span class="log-rumor">RUMOR(${ix.rumor.tag}\u2192${ix.rumor.target} acc=${(ix.rumor.accuracy*100).toFixed(0)}%)</span>`;
      return `<div class="log-interaction">${prefix} [${names}${fam}]${extra}</div>`;
    }

    if (l.type === 'secret' && l.secret) {
      return `<div>${prefix} <span class="log-secret">SECRET!</span> ${l.secret.summary || 'shared'}</div>`;
    }

    // 일반 행동 로그
    const pName = l.persona ? `<span style="color:var(--accent)">${l.persona}</span> ` : '';
    const act = l.sleeping ? '<span style="color:#aa88ff">수면</span>' : `<span style="color:var(--accent)">${l.action}</span>${l.intensity != null ? ' (강도'+l.intensity+')' : ''}`;
    return `<div>${prefix} ${pName}${act}</div>`;
  }).join('');
}

const TIPS = {

  "neuron-stats": {t:"뉴런 통계", b:"현재 틱에서 뉴런 네트워크의 활동 상태를 요약. 발화율, 흥분/억제 균형, 막전위 분포를 실시간 표시."},
  "active-neurons": {t:"활성 뉴런", b:"이번 틱에서 발화(spike)한 뉴런 수 / 전체 뉴런 수. 정상 범위는 1~5%. 현재는 튜닝 중이라 ~33%."},
  "firing-rate": {t:"발화율 (Firing Rate)", b:"전체 뉴런 중 발화한 비율. 0.01=1%. 실제 뇌의 정상 범위: 1~5Hz. 너무 높으면 간질(발작), 너무 낮으면 혼수."},
  "exc-fire": {t:"흥분 발화 (Excitatory)", b:"흥분 뉴런(전체의 80%)의 발화 수. 글루타메이트(Glu) 기반. 신호를 다음 뉴런으로 전달하여 활성화."},
  "inh-fire": {t:"억제 발화 (Inhibitory)", b:"억제 뉴런(전체의 20%)의 발화 수. GABA 기반. 다른 뉴런의 활동을 억누름. E/I 균형의 핵심."},
  "ei-balance": {t:"E/I Balance (흥분/억제 균형)", b:"흥분 뉴런과 억제 뉴런의 발화 비율. 0.5=완벽 균형. 높으면 흥분 과다(발작 위험), 낮으면 억제 과다(무반응). 실제 뇌의 핵심 항상성."},
  "voltage-dist": {t:"막전위 분포", b:"각 뉴런의 막전위(membrane potential) 히스토그램. 임계값(0.5)에 가까울수록 발화 직전. 0 근처=안정 상태."},
  "persona-state": {t:"페르소나 상태", b:"선택된 페르소나의 현재 내면 상태. 에너지, 신경조절물질 12클러스터, 감정(오욕/칠정), 행동을 실시간 표시."},
  "energy": {t:"에너지 (energy_pool)", b:"미토콘드리아가 공급하는 ATP 기반 체력. 1.0=만충, 0.1 미만=강제 수면. 행동할 때마다 소비되고, 수면 중 회복. 강도1=0.01/틱, 강도4=0.25/틱."},
  "tone-12": {t:"12클러스터 (Neuromodulator Tone)", b:"V=추구(DA), L=만족(β-END), S=안정(5-HT), B=유대(OXT), A=각성(NE), T=긴장(CORT), C=인지(ACh), G=성장(Glu), F=피로(ADO), I=억제(GABA), D=지배(T), P=보호(SP). 54종 신경화학물질을 12개 기능 클러스터로 압축. 각 값 1.0=기본. Mitotype(체질)에 따라 기저값이 다름."},

  "action": {t:"행동 (Action)", b:"PersonaBrain이 이번 틱에 선택한 행동. idle=대기, work=작업, eat=식사, sleep=수면, explore=탐색. 강도 1~4. 강도가 높을수록 에너지 소비 증가."},
  "time-log": {t:"시간 / 행동 로그", b:"게임 시간(1틱=게임 1시간=현실 30분)과 최근 행동 기록. 에너지 변화 그래프로 생활 패턴 확인 가능."},
  "relationships": {t:"관계 (Relationships)", b:"페르소나 간 관계 상태. 친밀도(familiarity): 0~1 바, 신뢰(trust): 수치 표시, 상호작용 횟수도 함께 표시."},
};

(function(){
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  const box = document.createElement('div');
  box.className = 'tooltip-box';
  document.body.appendChild(overlay);
  document.body.appendChild(box);

  overlay.addEventListener('click', () => { overlay.style.display='none'; box.style.display='none'; });

  document.addEventListener('click', e => {
    const btn = e.target.closest('.info-btn');
    if (!btn) return;
    const key = btn.dataset.tip;
    const tip = TIPS[key];
    if (!tip) return;

    const rect = btn.getBoundingClientRect();
    box.innerHTML = '<div class="tt-title">' + tip.t + '</div><div class="tt-body">' + tip.b + '</div>';

    let left = rect.left;
    let top = rect.bottom + 8;
    box.style.display = 'block';
    overlay.style.display = 'block';

    const bw = box.offsetWidth;
    const bh = box.offsetHeight;
    if (left + bw > window.innerWidth - 10) left = window.innerWidth - bw - 10;
    if (left < 10) left = 10;
    if (top + bh > window.innerHeight - 10) top = rect.top - bh - 8;

    box.style.left = left + 'px';
    box.style.top = top + 'px';
  });
})();

// ============================================================
// 패널 리사이즈 (드래그)
// ============================================================
(function(){
  const app = document.getElementById('app');
  let dragging = null, startX = 0, startY = 0, startLeft = 260, startRight = 260, startRowTop = 50;

  function getColLeft(){ return parseInt(getComputedStyle(app).getPropertyValue('--col-left')) || 260; }
  function getColRight(){ return parseInt(getComputedStyle(app).getPropertyValue('--col-right')) || 260; }
  function getRowTop(){ return parseInt(getComputedStyle(app).getPropertyValue('--row-top')) || 50; }

  document.getElementById('gutter-left').addEventListener('mousedown', e => {
    dragging = 'left'; startX = e.clientX; startLeft = getColLeft();
    e.target.classList.add('active'); e.preventDefault();
  });
  document.getElementById('gutter-right').addEventListener('mousedown', e => {
    dragging = 'right'; startX = e.clientX; startRight = getColRight();
    e.target.classList.add('active'); e.preventDefault();
  });
  document.getElementById('gutter-row-right').addEventListener('mousedown', e => {
    dragging = 'row'; startY = e.clientY; startRowTop = getRowTop();
    e.target.classList.add('active'); e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    if (dragging === 'left') {
      const w = Math.max(160, Math.min(500, startLeft + (e.clientX - startX)));
      app.style.setProperty('--col-left', w + 'px');
    } else if (dragging === 'right') {
      const w = Math.max(160, Math.min(500, startRight - (e.clientX - startX)));
      app.style.setProperty('--col-right', w + 'px');
    } else if (dragging === 'row') {
      const pct = Math.max(20, Math.min(80, ((e.clientY - app.getBoundingClientRect().top) / app.clientHeight) * 100));
      app.style.gridTemplateRows = pct + '% 6px ' + (100 - pct) + '%';
    }
    window.dispatchEvent(new Event('resize'));
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      document.querySelectorAll('.gutter-col,.gutter-row').forEach(g => g.classList.remove('active'));
      dragging = null;
    }
  });
})();
</script>
